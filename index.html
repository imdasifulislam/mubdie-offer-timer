<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mubdie Offer Timer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#fff;display:flex;justify-content:center;align-items:center;min-height:100vh}
.offer-box{text-align:center;padding:20px}
.offer-title{font-size:60px;font-weight:700;color:#E53935;margin-bottom:20px}
.timer{display:flex;justify-content:center;gap:16px;flex-wrap:wrap}
.time-box{width:155px;background:#8C52FF;color:#fff;border-radius:14px;padding:20px 15px;box-shadow:0 8px 20px rgba(140,82,255,.25)}
.time{font-size:56px;font-weight:700}
.label{margin-top:8px;font-size:18px}
@media(max-width:768px){
.offer-title{font-size:28px}
.time-box{width:100px;padding:15px 10px}
.time{font-size:38px}
.label{font-size:14px}
}
</style>
</head>
<body>
<div class="offer-box">
<div class="offer-title">🔥 ৳১,২৯০ অফার শেষ হতে বাকি</div>
<div class="timer">
<div class="time-box"><div id="hour" class="time">00</div><div class="label">Hours</div></div>
<div class="time-box"><div id="minute" class="time">00</div><div class="label">Minutes</div></div>
<div class="time-box"><div id="second" class="time">00</div><div class="label">Seconds</div></div>
</div>
</div>

<script>
function updateTimer(){
  const now=new Date();

  // বাংলাদেশ সময় (UTC+6)
  const bdNow=new Date(now.toLocaleString("en-US",{timeZone:"Asia/Dhaka"}));

  let target=new Date(bdNow);
  target.setHours(2,0,0,0);

  if(bdNow>=target){
    target.setDate(target.getDate()+1);
  }

  const diff=target-bdNow;

  const h=Math.floor(diff/1000/60/60);
  const m=Math.floor((diff%(1000*60*60))/1000/60);
  const s=Math.floor((diff%(1000*60))/1000);

  document.getElementById("hour").textContent=String(h).padStart(2,"0");
  document.getElementById("minute").textContent=String(m).padStart(2,"0");
  document.getElementById("second").textContent=String(s).padStart(2,"0");
}
updateTimer();
setInterval(updateTimer,1000);
</script>
</body>
</html>
